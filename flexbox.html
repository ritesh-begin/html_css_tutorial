<!DOCTYPE html>
<html>
    <head>
      <title>
				Flexbox practice
			</title>
    </head>
    <body>
			<div style="
				display: flex;
				flex-direction: row;
				">
				<div style="background-color: pink;">
					div 1 this is a text 
				</div>
				<div style="background-color: aqua;">
					div2 <p>this is paragraph</p>
				</div>
			</div>
			<div style="
				display: flex;
				flex-direction: row;
				margin-top: 20px;
				">
				<div style="background-color: pink;
				width: 100px;
				">
					100px
				</div>
				<div style="background-color: aqua;
				flex: 1;
				">
					flex 1
				</div>
			</div>
			<div style="
				display: flex;
				flex-direction: row;
				margin-top: 20px;
				">
				
				<div style="background-color: aqua;
				flex: 1;
				">
					flex 1
				</div>
				<div style="background-color: lightblue;
				width: 100px;
				">
					100px
				</div>
				<div style="background-color: pink;
				flex: 2;
				">
					flex 2
				</div>
			</div>
			<div style="
				display: flex;
				flex-direction: row;
				margin-top: 20px;
				height: 90px;
				justify-content:space-between;
				align-items:center;
				font-size: large;
				border: 2px;
				border-style: solid;
				">
				
				<div style="background-color: aqua;
				width: 100px;
				">
					100px
				</div>
				<div style="background-color: lightblue;
				width: 100px;
				">
					100px
				</div>
				<div style="background-color: pink;
				width: 100px;
				">
					100px
				</div>
			</div>
			<div style="padding-top: 400px;">
				<p>
					This is for the grid.
				</p>
				<div style="display: grid;
				grid-template-columns: 1fr 1fr 1fr;
				height: 300px;column-gap: 20px;row-gap: 20px;
				">
					<div style="background-color: lightblue;">
						1fr
					</div>
					<div style="background-color: lightpink;">
						1fr
					</div>
					<div style="background-color: lightblue;">
						1fr
					</div>
					<div style="background-color: lightblue;">
						1fr
					</div>
					<div style="background-color: lightpink;">
						1fr
					</div>
					<div style="background-color: lightblue;">
						1fr
					</div>
				</div>
			</div>
    </body>
</html>
